/* MORI модальное окно */
.mori-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    z-index: 20000;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
}

.mori-modal-content {
    background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
    border: 1px solid #ffd700;
    border-radius: 24px;
    padding: 24px 20px;
    max-width: 320px;
    width: 85%;
    text-align: center;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
    animation: slideUp 0.2s ease;
}

.mori-modal-icon {
    font-size: 48px;
    margin-bottom: 16px;
}

.mori-modal-title {
    font-size: 20px;
    font-weight: bold;
    color: #ffd700;
    margin-bottom: 12px;
}

.mori-modal-message {
    font-size: 14px;
    color: #ccc;
    margin-bottom: 24px;
    line-height: 1.4;
}

.mori-modal-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
}

.mori-modal-btn {
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
}

.mori-modal-btn.confirm {
    background: #ffd700;
    color: #000;
}

.mori-modal-btn.confirm:hover {
    background: #ffed4a;
    transform: scale(1.02);
}

.mori-modal-btn.cancel {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.mori-modal-btn.cancel:hover {
    background: rgba(255, 255, 255, 0.2);
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

/* Анимация кнопок входа и регистрации — финальный вариант */
.auth-btn {
    position: relative !important;
    overflow: hidden !important;
    transition: all 0.3s ease !important;
    animation: gentleGlow 2s ease-in-out infinite !important;
    background: linear-gradient(135deg, #d4af37, #b8960c) !important;
    color: #000 !important;
    font-weight: bold !important;
    border: none !important;
    padding: 12px 24px !important;
    border-radius: 30px !important;
    cursor: pointer !important;
}

.auth-btn::before {
    content: '' !important;
    position: absolute !important;
    top: 0 !important;
    left: -100% !important;
    width: 100% !important;
    height: 100% !important;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), rgba(255, 215, 0, 0.6), rgba(255, 255, 255, 0.4), transparent) !important;
    animation: shimmer 3s infinite !important;
    pointer-events: none !important;
}

@keyframes gentleGlow {
    0%, 100% {
        box-shadow: 0 0 5px rgba(212, 175, 55, 0.3), 0 0 10px rgba(212, 175, 55, 0.2);
    }
    50% {
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.6), 0 0 25px rgba(212, 175, 55, 0.3);
    }
}

@keyframes shimmer {
    0% { left: -100%; }
    100% { left: 100%; }
}

.auth-btn {
    opacity: 1 !important;
}

#auth-register,
#auth-register span {
    white-space: nowrap !important;
}

#dynamic-bottom-nav .nav-btn.active {
    color: #ffd700 !important;
}

/* Анимация перелёта иконки */
.flying-icon {
    position: fixed;
    z-index: 100000;
    transition: all 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    pointer-events: none;
    font-size: 24px;
    filter: drop-shadow(0 0 5px #ffd700);
}

@keyframes iconPulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
}

/* Скрываем чат для админа сразу */

<script>
// Скрываем иконку темы в модулях, кроме портфеля
function toggleThemeIcon() {
    const themeIcon = document.querySelector('.theme-icon');
    const currentScreen = window.MORI_ROUTER ? MORI_ROUTER.currentScreen : null;
    
    if (themeIcon) {
        if (currentScreen === 'portfolio') {
            themeIcon.style.display = 'flex';
        } else {
            themeIcon.style.display = 'none';
        }
    }
}

if (window.MORI_ROUTER) {
    const originalNavigate = MORI_ROUTER.navigate;
    MORI_ROUTER.navigate = function(screenId, options) {
        originalNavigate.call(this, screenId, options);
        setTimeout(toggleThemeIcon, 100);
    };
    setTimeout(toggleThemeIcon, 500);
}
</script>

<script>
// Меню иконки темы — быстрый доступ к темам
(function() {
    const themeIcon = document.querySelector('.theme-icon');
    if (!themeIcon) return;
    
    // Создаём меню
    let menu = document.getElementById('quick-theme-menu');
    if (!menu) {
        menu = document.createElement('div');
        menu.id = 'quick-theme-menu';
        menu.style.cssText = `
            position: fixed;
            top: 70px;
            right: 16px;
            background: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 16px;
            padding: 12px;
            z-index: 10001;
            display: none;
            max-width: 280px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        `;
        document.body.appendChild(menu);
    }
    
    // Открыть меню по клику на иконку
    themeIcon.addEventListener('click', (e) => {
        e.stopPropagation();
        if (menu.style.display === 'none' || menu.style.display === '') {
            renderMenu();
            menu.style.display = 'block';
        } else {
            menu.style.display = 'none';
        }
    });
    
    // Закрыть при клике вне меню
    document.addEventListener('click', () => {
        menu.style.display = 'none';
    });
    menu.addEventListener('click', (e) => e.stopPropagation());
    
    function renderMenu() {
        if (!window.MORI_THEMES) {
            menu.innerHTML = '<div style="color:#aaa; padding:8px;">Загрузка тем...</div>';
            return;
        }
        
        const categories = MORI_THEMES.getThemesByCategory();
        let html = '';
        
        for (const [key, cat] of Object.entries(categories)) {
            html += `<div style="margin-bottom: 12px;">
                <div style="color:#d4af37; font-size:11px; margin-bottom:6px;">${cat.icon} ${cat.name}</div>
                <div style="display: flex; flex-wrap: wrap; gap: 6px;">`;
            
            cat.themes.forEach(theme => {
                html += `
                    <button class="quick-theme-btn ${theme.isCurrent ? 'active' : ''} ${!theme.isUnlocked ? 'locked' : ''}"
                            data-theme="${theme.id}"
                            style="background: ${theme.isCurrent ? '#d4af37' : '#333'}; 
                                   border: none; 
                                   border-radius: 20px; 
                                   padding: 4px 8px; 
                                   color: ${theme.isCurrent ? '#000' : '#fff'}; 
                                   font-size: 10px; 
                                   cursor: pointer;
                                   display: inline-flex;
                                   align-items: center;
                                   gap: 4px;
                                   opacity: ${!theme.isUnlocked ? '0.5' : '1'};">
                        <span>${theme.icon}</span>
                        <span>${theme.name}</span>
                        ${!theme.isUnlocked ? '<span>🔒</span>' : ''}
                    </button>
                `;
            });
            
            html += `</div></div>`;
        }
        
        html += `<div style="border-top: 1px solid #333; margin-top: 8px; padding-top: 8px;">
                    <button id="open-themes-in-profile" style="width:100%; background:#d4af37; border:none; border-radius:20px; padding:6px; color:#000; cursor:pointer;">🎨 Все темы в профиле</button>
                </div>`;
        
        menu.innerHTML = html;
        
        // Добавляем обработчики
        document.querySelectorAll('.quick-theme-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const themeId = btn.dataset.theme;
                const isLocked = btn.classList.contains('locked');
                
                if (isLocked) {
                    MORI_APP.showToast('🔒 Выполните задание для разблокировки', 'error');
                } else if (window.MORI_THEMES) {
                    MORI_THEMES.applyTheme(themeId);
                    renderMenu();
                }
                menu.style.display = 'none';
            });
        });
        
        const openProfileBtn = document.getElementById('open-themes-in-profile');
        if (openProfileBtn) {
            openProfileBtn.addEventListener('click', () => {
                if (window.MORI_ROUTER) {
                    MORI_ROUTER.navigate('profile');
                    setTimeout(() => {
                        const settingsTab = document.querySelector('.profile-tab[data-tab="settings"]');
                        if (settingsTab) settingsTab.click();
                    }, 300);
                }
                menu.style.display = 'none';
            });
        }
    }
})();
</script>

<script>
// Показ панели после авторизации
function showNewNavigation() {
    const nav = document.getElementById('dynamic-bottom-nav');
    const leftBtn = document.getElementById('new-floating-left');
    const rightBtn = document.getElementById('new-floating-right');
    if (nav) nav.style.display = 'flex';
    if (leftBtn) leftBtn.style.display = 'block';
    if (rightBtn) rightBtn.style.display = 'block';
}

// Обработчики кликов
document.getElementById('dynamic-bottom-nav')?.addEventListener('click', (e) => {
    const btn = e.target.closest('.nav-btn');
    if (btn && window.MORI_ROUTER) MORI_ROUTER.navigate(btn.dataset.module);
});
document.getElementById('new-floating-left')?.addEventListener('click', () => {
    if (window.MORI_ROUTER) MORI_ROUTER.navigate('house');
});
document.getElementById('new-floating-right')?.addEventListener('click', () => {
    if (window.MORI_ROUTER) MORI_ROUTER.navigate('all-apps');
});

function updateActiveButton() {
    const current = window.MORI_ROUTER?.currentScreen || 'portfolio';
    document.querySelectorAll('#dynamic-bottom-nav .nav-btn').forEach(btn => {
        const moduleName = btn.getAttribute('data-module');
        if (moduleName === current) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
}

// Запускаем при загрузке
setTimeout(() => {
    updateActiveButton();
    updateChatButton();
}, 500);

// Перехватываем навигацию
if (window.MORI_ROUTER) {
    const orig = MORI_ROUTER.navigate;
    MORI_ROUTER.navigate = function(screenId, opts) {
        orig.call(this, screenId, opts);
        updateActiveButton();
    };
}

function updateChatButton() {
    const chatBtn = document.querySelector('#dynamic-bottom-nav .nav-btn[data-module="chat"]');
    const bottomNav = document.getElementById('dynamic-bottom-nav');

    // Для админа — чат не показываем
    if (window.MORI_APP && MORI_APP.accessLevel === 'admin') {
        if (chatBtn) chatBtn.style.display = 'none';
        if (bottomNav) bottomNav.classList.remove('has-chat');
        return;
    }

    const completedTasks = window.MORI_TASKS ? MORI_TASKS.getCompletedCount() : 0;
    const calculatorUnlocked = completedTasks >= 5;
    const libraryUnlocked = completedTasks >= 11;
    const aiUnlocked = completedTasks >= 18;
    const allUnlocked = calculatorUnlocked && libraryUnlocked && aiUnlocked;
    const allAppsBtn = document.querySelector('#new-floating-right .floating-btn');

    if (chatBtn && allUnlocked) {
        if (chatBtn.style.display !== 'none') {
            // Получаем координаты кнопок
            const chatRect = chatBtn.getBoundingClientRect();
            const appsRect = allAppsBtn.getBoundingClientRect();

            // Создаём клон иконки
            const clone = document.createElement('div');
            clone.innerHTML = '💬';
            clone.className = 'flying-icon';
            clone.style.left = chatRect.left + (chatRect.width / 2) - 12 + 'px';
            clone.style.top = chatRect.top + (chatRect.height / 2) - 12 + 'px';
            document.body.appendChild(clone);

            // Запускаем анимацию
            setTimeout(() => {
                clone.style.left = appsRect.left + (appsRect.width / 2) - 12 + 'px';
                clone.style.top = appsRect.top + (appsRect.height / 2) - 12 + 'px';
                clone.style.transform = 'scale(0.5)';
                clone.style.opacity = '0.5';
            }, 50);

            // Удаляем клон и скрываем кнопку после анимации
            setTimeout(() => {
                clone.remove();
                chatBtn.style.display = 'none';
                if (bottomNav) bottomNav.classList.remove('has-chat');
                MORI_APP.showToast('💬 Чат перемещён во "Все приложения"', 'info', 3000);

                // Добавляем бейдж на кнопку "Все приложения"
                if (allAppsBtn && !allAppsBtn.querySelector('.chat-badge')) {
                    const badge = document.createElement('span');
                    badge.textContent = '💬';
                    badge.style.cssText = 'position: absolute; top: -5px; right: -5px; background: #ffd700; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; color: #000;';
                    badge.classList.add('chat-badge');
                    allAppsBtn.style.position = 'relative';
                    allAppsBtn.appendChild(badge);
                    setTimeout(() => badge.remove(), 5000);
                }
            }, 650);
        }
    } else if (chatBtn && !allUnlocked) {
        chatBtn.style.display = 'flex';
        if (bottomNav) bottomNav.classList.add('has-chat');
        chatBtn.classList.remove('chat-fade-out');
    }
}


</script>
