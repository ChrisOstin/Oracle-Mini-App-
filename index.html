    <title>MORI Oracle</title>

    <link rel="stylesheet" href="css/core/reset.css">
    <link rel="stylesheet" href="css/core/variables.css">
    <link rel="stylesheet" href="css/core/fonts.css">

    <!-- Тема по умолчанию (mori-classic) -->
    <link rel="stylesheet" href="css/themes/mori-classic.css" id="theme-style">

    <!-- Стили модулей -->
    <link rel="stylesheet" href="css/modules/portfolio.css">
    <link rel="stylesheet" href="css/modules/calculator.css">
    <link rel="stylesheet" href="css/modules/library.css">
    <link rel="stylesheet" href="css/modules/ai-chat.css">
    <link rel="stylesheet" href="css/modules/profile.css">

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.0/dist/chartjs-chart-financial.min.js"></script>   

    <style>
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
    
        .module-title {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    color: #FFD700;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    animation: logoPulse 2s ease-in-out infinite;
    margin: 16px 0;
    white-space: nowrap;
}

@keyframes logoPulse {
    0%, 100% {
        opacity: 1;
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }
    50% {
        opacity: 0.8;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
    }
}
   
    </style>
</head>
<body>
    <div class="theme-icon">🎭</div>
     <div class="module-title" id="portfolio-title" style="display: block;">Портфель</div>
<div class="module-title" id="calculator-title" style="display: none;">Калькулятор</div>

<div class="module-title" id="games-title" style="display: none;">Игры</div>
<div class="module-title" id="mori-wallet-title" style="display: none;">MORI Wallet</div>
<div class="module-title" id="mori-work-title" style="display: none;">MORI Work</div>
<div class="module-title" id="retro-phone-title" style="display: none;">Ретро-телефон</div>
<div class="module-title" id="mori-story-title" style="display: none;">MORI Story</div>
    <div id="app"></div>
<!-- Контейнеры для всех модулей -->
<div id="portfolio-content" class="module-container" style="display: none;"></div>
